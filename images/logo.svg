<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="50" viewBox="0 0 200 50" xmlns="http://www.w3.org/2000/svg">
  <style>
    .logo-text { font-family: 'Inter', sans-serif; font-weight: bold; }
    .primary { fill: #bb86fc; }
    .secondary { fill: #03dac6; }
    .light-theme .primary { fill: #6200ee; }
    .light-theme .secondary { fill: #018786; }
  </style>
  <g>
    <rect x="10" y="10" width="30" height="30" rx="4" class="primary"/>
    <rect x="20" y="20" width="30" height="30" rx="4" class="secondary" opacity="0.8"/>
    <text x="60" y="35" class="logo-text primary" font-size="24">Design Systems</text>
  </g>
</svg>